# v0.2 intervals: "every N units" periodic recurrences (specs/contracts/semantics.md
# §Intervals), epoch-anchored at 1970-01-01T00:00:00 in the evaluation zone.
cases:
  - name: interval-90-minutes-canonical
    isnow: "+[90mn]"
    canonical: "*/*/* * *:*:00 +[90mn]"
  - name: interval-90-minutes-holds-midnight
    isnow: "+[90mn]"
    at: "2026-07-14T00:00:00Z"
    holds: true
  - name: interval-90-minutes-holds-90-later
    isnow: "+[90mn]"
    at: "2026-07-14T01:30:00Z"
    holds: true
  - name: interval-90-minutes-misses-on-hour
    isnow: "+[90mn]"
    at: "2026-07-14T01:00:00Z"
    holds: false
  - name: interval-25-hours-drifts-across-days
    isnow: "+[25h]"
    from: "2026-07-14T00:00:00Z"
    next:
      - "2026-07-14T23:00:00Z"
      - "2026-07-16T00:00:00Z"
      - "2026-07-17T01:00:00Z"
  - name: interval-10-days-at-midnight
    isnow: "+[10d]"
    from: "2026-07-14T00:00:00Z"
    next:
      - "2026-07-16T00:00:00Z"
      - "2026-07-26T00:00:00Z"
  - name: interval-30-seconds-canonical
    isnow: "+[30s]"
    canonical: "*/*/* * *:*:* +[30s]"
  - name: interval-30-seconds-holds
    isnow: "+[30s]"
    at: "2026-07-14T09:00:30Z"
    holds: true
  - name: interval-30-seconds-misses
    isnow: "+[30s]"
    at: "2026-07-14T09:00:15Z"
    holds: false
  - name: interval-with-weekday-and-bounds
    isnow: "M-F +[90mn] >=6 <=18"
    at: "2026-07-14T07:30:00Z"
    holds: true
  - name: interval-with-weekday-misses-weekend
    isnow: "M-F +[90mn] >=6 <=18"
    at: "2026-07-18T07:30:00Z"
    holds: false
