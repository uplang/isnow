# Quality budget for the isnow ecosystem (specs/ecosystem.md).
# All work is production-bound; planner, implementer, and reviewer optimize
# against these targets. Minimum passing score for the production tier: 90.
tier: production
max_cognitive_complexity: 7        # gocognit / eslint complexity — the fleet gate
max_function_length: 50
max_dependencies_per_package: 8
minimum_test_coverage: 100         # of owned (non-generated) packages, per repo gate
required_error_handling: exhaustive   # every failure path asserted via errors.Is / .code
required_observability: structured_logs   # slog in the CLI/server; no metrics endpoint in v1

# Context-specific constraints layered on the profile:
contexts:
  go-engine:
    fuzz: FuzzParse seeded with every corpus isnow; parse→canonical→reparse fixed point
    purity: no wall clock, no env, no globals — zone and instant always injected
  go-cli:
    injection: clock, writers, sleeper, spawner injected; no real sleeps in tests
  go-server:
    handlers: pure functions of (request, clock); httptest coverage incl. SSE + long-poll timeout
  js-engine:
    coverage: node --test --test-coverage-lines=100 over src/isnow/**
    parity: conformance results byte-identical to Go's
  language-core:
    corpus: >= 120 cases; every semantics-contract rule exercised; case names unique
  web-playground:
    build: site build clean; no console errors; no network calls from the page
  docs-governance:
    template: managed pages.yml unmodified; manifest parses; every command/endpoint documented
