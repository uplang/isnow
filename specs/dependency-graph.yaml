# Build-order dependency graph for the isnow ecosystem (specs/ecosystem.md).
# Nodes are bounded contexts; edges are "depends on".
contexts:
  language-core:
    home: tsvsheet/isnow
    depends-on: []
    provides: [terminology, conformance-corpus, generated-parsers]
  go-engine:
    home: tsvsheet/isnow.go
    depends-on: [language-core]
    provides: [library-api-go]
  go-cli:
    home: tsvsheet/isnow.go
    depends-on: [go-engine]
    provides: [isnow-binary]
  go-server:
    home: tsvsheet/isnow.go
    depends-on: [go-engine, go-cli]
    provides: [http-api]
  js-engine:
    home: tsvsheet/isnow.js
    depends-on: [language-core]
    provides: [library-api-js]
  web-playground:
    home: uplang/www.uplang.org
    depends-on: [js-engine]
    provides: [playground]
  docs-governance:
    home: tsvsheet/docs.isnow.go, tsvsheet/docs.isnow.js, tsvsheet/_admin
    depends-on: [go-cli, go-server, js-engine]
    provides: [docs, manifest-entries]
